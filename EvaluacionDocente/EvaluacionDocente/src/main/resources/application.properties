spring.application.name=EvaluacionDocente

# -------------------------
# DATASOURCE MYSQL
# -------------------------

spring.datasource.url=jdbc:mysql://localhost:3306/evaluacion_empleados
spring.datasource.username=usr-spring
spring.datasource.password=usr-spring1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------
# JPA / HIBERNATE
# -------------------------

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# -------------------------
# PUERTO DEL SERVIDOR
# -------------------------

server.port=8081

# -------------------------
# SWAGGER
# -------------------------

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs